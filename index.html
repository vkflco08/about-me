<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>자기소개 페이지</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 20px;
            background-color: #f4f4f4;
        }
        h1, h2 {
            color: #333;
        }
        .container {
            max-width: 800px;
            margin: auto;
            background: #fff;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>안녕하세요, 제 이름은 조승빈입니다!</h1>
        <p>여러분을 만나게 되어 매우 기쁩니다. 반갑습니다!</p>

        <h2>내 소개</h2>
        <p>고려대학교 세종캠퍼스에서 컴퓨터융합소프트웨어학과에 재학중입니다. </p>

        <h2>개발 스킬</h2>
        <p>Spring boot, Node.js</p>

        <h2>꿈 혹은 하고 싶은 말</h2>
        <p>꿈은 없고요, 그냥 놀고 싶습니다.</p>
    </div>

</body>
</html>
